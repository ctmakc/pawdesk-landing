name = "pawdesk-landing"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# CF Pages KV namespace binding (fallback waitlist storage)
# To set up:
#   1. Create a KV namespace: wrangler kv namespace create WAITLIST
#   2. Paste the returned namespace_id below
#   3. For preview: also add a preview_id (create with --preview flag)
# ---------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "WAITLIST"
# id = "YOUR_KV_NAMESPACE_ID"
# preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"

# ---------------------------------------------------------------------------
# Environment variables (set secrets in CF Pages dashboard, not here)
# Required if using Resend Audience path:
#   RESEND_API_KEY       → CF Pages > Settings > Environment variables (encrypted)
#   RESEND_AUDIENCE_ID   → CF Pages > Settings > Environment variables
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Build config — no build step needed (static HTML)
# ---------------------------------------------------------------------------
[build]
command = ""
